server.port=8090
spring.application.name=kafkatest
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.observation.enabled=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=1000
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.ack-mode=record
spring.kafka.admin.fail-fast=false
spring.kafka.admin.properties.request.timeout.ms=30000
spring.kafka.admin.properties.retries=5
spring.kafka.admin.properties.retry.backoff.ms=1000
spring.kafka.properties.session.timeout.ms=10000
spring.kafka.properties.heartbeat.interval.ms=3000
spring.kafka.properties.max.poll.interval.ms=300000
spring.cloud.stream.kafka.binder.brokers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.cloud.stream.kafka.binder.enable-observation=true
spring.cloud.stream.bindings.message-out-0.destination=kafkatest
spring.cloud.stream.bindings.message-out-0.content-type=application/json
management.tracing.enabled=true
management.tracing.application.name=kafkatest
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${SPRING_ZIPKIN_SERVERS:http://zipkin:9411/api/v2/spans}
management.zipkin.kafka.topic=ZIPKIN_TOPIC
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.kafka.enabled=true
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.level.io.micrometer=INFO
logging.level.brave=INFO
logging.level.zipkin=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.boot.actuate=INFO
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_SERVERS:http://elasticsearch:9200}
