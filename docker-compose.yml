version: "3.9"

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    networks: [ observability ]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafkatest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kafkatest
    networks: [ observability ]
    ports:
      - "8090:8090"
    depends_on:
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: my-group
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1"
      MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENABLED: "true"
      MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT: "http://zipkin:9411/api/v2/spans"
      MANAGEMENT_TRACING_APPLICATION_NAME: "kafkatest"

  kafka-ui:
    image: tchiotludo/akhq:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    networks: [ observability ]
    entrypoint: |
      sh -c '
      echo "Creating application.yml..."
      cat <<EOL > /app/application.yml
      ---
      akhq:
        connections:
          local:
            properties:
              bootstrap.servers: "kafka:9092"
        security:
          default-group: admin
      EOL
      cat /app/application.yml
      exec java -jar /app/akhq.jar
      '

  zipkin:
    image: openzipkin/zipkin:2.27
    container_name: zipkin
    ports:
      - "9411:9411"
    networks: [ observability ]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ZIPKIN_TOPIC

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks: [ observability ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://elasticsearch:9200" ]
      interval: 10s
      retries: 10

networks:
  observability:
    driver: bridge
